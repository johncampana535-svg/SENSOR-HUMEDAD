<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sky Distance Visualizer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sky" id="sky">

  <!-- Nubes -->
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>

  <!-- Torres -->
  <div class="tower t1"></div>
  <div class="tower t2"></div>

  <!-- Avión -->
  <div id="plane">✈️</div>

  <!-- Panel -->
  <div class="panel">
    <h2 id="dist">-- cm</h2>
    <p id="state">Conectando...</p>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
